<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Ledger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <h1>Poker Ledger</h1>
    <div class="header-info">
      <span>Buy-in Value = <strong>₹500</strong></span>
      <span>Chip Value = <strong>₹20</strong></span>
    </div>
    <div class="header-buttons">
      <button id="addPlayerBtn" class="btn btn-primary">Add Player</button>
      <button id="transferBtn" class="btn btn-secondary">Transfer Buy-in</button>
      <button id="resetBtn" class="btn btn-danger">Reset Game</button>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main class="app-main">

    <!-- Player table section -->
    <section class="table-section">
      <div class="table-wrapper">
        <table id="playerTable">
          <thead>
            <tr>
              <th>Player Name</th>
              <th>Buy-ins</th>
              <th>Final Chips</th>
              <th>Chip Value</th>
              <th>Profit / Loss</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody id="playerTableBody">
            <!-- Player rows are inserted here by script.js -->
          </tbody>
        </table>
        <p id="emptyMessage" class="empty-message">No players yet. Click "Add Player" to get started.</p>
      </div>
    </section>

    <!-- History panel -->
    <section class="history-section">
      <h2>History</h2>
      <ul id="historyList" class="history-list">
        <!-- History entries are inserted here by script.js -->
      </ul>
    </section>

  </main>

  <!-- ===== TRANSFER MODAL ===== -->
  <div id="transferModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Transfer Buy-in</h2>

      <label for="fromSelect">From</label>
      <select id="fromSelect"></select>

      <label for="toSelect">To</label>
      <select id="toSelect"></select>

      <label for="amountInput">Amount</label>
      <input type="number" id="amountInput" min="1" value="1" />

      <p id="transferError" class="error-message"></p>

      <div class="modal-buttons">
        <button id="cancelTransferBtn" class="btn btn-secondary">Cancel</button>
        <button id="confirmTransferBtn" class="btn btn-primary">Transfer</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
